{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Freelancer | NexusFreelance{% endblock %}
{% block page_title %}{% if editing %}Edit Freelancer{% else %}New Freelancer{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Skills</label>
        <input type="text" name="skills" value="{{ record.skills|default:'' }}">
      </div>
      <div class="form-group">
        <label>Hourly Rate</label>
        <input type="number" step="0.01" name="hourly_rate" value="{{ record.hourly_rate|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Projects Completed</label>
        <input type="number" name="projects_completed" value="{{ record.projects_completed|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available" {% if record.status == 'available' %}selected{% endif %}>Available</option>
          <option value="busy" {% if record.status == 'busy' %}selected{% endif %}>Busy</option>
          <option value="offline" {% if record.status == 'offline' %}selected{% endif %}>Offline</option>
        </select>
      </div>
      <div class="form-group">
        <label>Portfolio Url</label>
        <input type="url" name="portfolio_url" value="{{ record.portfolio_url|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio">{{ record.bio|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Freelancer</button>
      <a href="/freelancers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
