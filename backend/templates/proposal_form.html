{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Proposal | NexusFreelance{% endblock %}
{% block page_title %}{% if editing %}Edit Proposal{% else %}New Proposal{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Project Title</label>
        <input type="text" name="project_title" value="{{ record.project_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Freelancer Name</label>
        <input type="text" name="freelancer_name" value="{{ record.freelancer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Bid Amount</label>
        <input type="number" step="0.01" name="bid_amount" value="{{ record.bid_amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Delivery Days</label>
        <input type="number" name="delivery_days" value="{{ record.delivery_days|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="submitted" {% if record.status == 'submitted' %}selected{% endif %}>Submitted</option>
          <option value="shortlisted" {% if record.status == 'shortlisted' %}selected{% endif %}>Shortlisted</option>
          <option value="accepted" {% if record.status == 'accepted' %}selected{% endif %}>Accepted</option>
          <option value="rejected" {% if record.status == 'rejected' %}selected{% endif %}>Rejected</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Cover Letter</label>
      <textarea name="cover_letter">{{ record.cover_letter|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Submitted Date</label>
        <input type="date" name="submitted_date" value="{{ record.submitted_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Proposal</button>
      <a href="/proposals/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
